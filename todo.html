<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - Fábio Dev</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        .todo-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background: #764ba2; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>✅ Task Master</h2>
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value;
            if (taskText === '') return;

            const li = document.createElement('li');
            li.innerHTML = `${taskText} <button onclick="this.parentElement.remove()" style="background:red; padding:5px;">X</button>`;
            document.getElementById('taskList').appendChild(li);
            input.value = '';
        }
    </script>

</body>
</html>
