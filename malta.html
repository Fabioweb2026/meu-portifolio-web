<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giorgios Cafeteria | Malta</title>
    <style>
        @import url('https://googleapis.com');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf6; color: #2c1e1a; }
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #fff; font-weight: 800; font-size: 11px; text-transform: uppercase; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(5px); z-index: 100; }
        .hero { width: 100%; height: 60vh; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('img/giorgios-capa.jpg') no-repeat center center; background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 80px; }
        .content { max-width: 900px; margin: -50px auto 50px; background: #fff; padding: 60px; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); position: relative; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Voltar ao Portfólio</a>
    <header class="hero">
        <h1>Giorgios</h1>
        <p>A Essência de Malta em Sliema</p>
    </header>
    <div class="content">
        <h2>Experiência Gastronômica</h2>
        <p>Localizada em frente ao mar, a Giorgios é o ponto de encontro mais sofisticado de Malta.</p>
        <div class="gallery">
            <img src="img/giorgios1.jpg" alt="Café">
            <img src="img/giorgios2.jpg" alt="Malta">
            <img src="img/giorgios3.jpg" alt="Sobremesas">
        </div>
    </div>
</body>
</html>
