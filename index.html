<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Web | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('foto.fabio1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            color: #b39359;
            text-transform: uppercase;
        }

        .projects-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: rgba(26, 26, 26, 0.95); 
            width: 350px; 
            border-radius: 25px;
            color: #fff;
            border: 1px solid rgba(179, 147, 89, 0.3);
            transition: 0.4s;
            overflow: hidden;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #b39359;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .card-banner img {
            width: 100%;
            display: block;
        }

        .card-content {
            padding: 25px;
            text-align: center;
        }

        .card h3 {
            font-size: 1.4rem;
            color: #b39359;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 0.95rem;
            color: #ddd;
            line-height: 1.6;
        }

        .card-icon-emoji {
            font-size: 70px;
            margin: 20px 0;
            display: block;
            color: #b39359;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid #b39359;
        }

        .modal-content h2 {
            color: #b39359;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #ddd;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #b39359;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .close {
            margin-top: 15px;
            display: block;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .card { width: 100%; }
        }
    </style>
</head>

<body>

<h1>Web Portfolio</h1>

<div class="projects-grid">

    <!-- CARD 1 -->
    <div class="card" onclick="openModal(
        'Sollene Group',
        'International inventory management system with automated financial calculations.',
        'estoque.html'
    )">
        <div class="card-banner">
            <img src="imagem.Sollene%20Group.png" alt="Sollene Group">
        </div>
        <div class="card-content">
            <h3>Sollene Group</h3>
            <p>Inventory management system.</p>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card" onclick="openModal(
        'Malta Project',
        'Institutional platform focused on global expansion and logistics.',
        'malta.html'
    )">
        <div class="card-content">
            <span class="card-icon-emoji">🌍</span>
            <h3>Malta Project</h3>
            <p>Global business platform.</p>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="card" onclick="openModal(
        'Resume',
        'Professional resume with experience and skills.',
        'resume.pdf'
    )">
        <div class="card-content">
            <span class="card-icon-emoji">📄</span>
            <h3>Resume</h3>
            <p>Professional profile.</p>
        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <a id="modalLink" class="btn" target="_blank">Open Project</a>
        <span class="close" onclick="closeModal()">Close</span>
    </div>
</div>

<script>
function openModal(title, text, link) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalText').innerText = text;
    document.getElementById('modalLink').href = link;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

// fechar clicando fora
window.onclick = function(event) {
    let modal = document.getElementById('modal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}
</script>

</body>
</html>
