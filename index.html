<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Portfólio</title>
    <style>
        @import url('https://googleapis.com');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f4f1ea;
            color: #1a1a1a;
        }

        .hero {
            width: 100%;
            height: 85vh;
            background: linear-gradient(to bottom, rgba(244, 241, 234, 0) 50%, #f4f1ea 100%), url('foto.fabio1.jpg') no-repeat center 20%;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
            padding-bottom: 50px;
        }

        .hero h1 {
            font-size: 85px;
            font-weight: 800;
            color: #000000;
            letter-spacing: -4px;
            line-height: 0.8;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #b39359;
            font-weight: 800;
            margin-top: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #000000;
            border: 1px solid #b39359;
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            color: #ffffff;
            transition: 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(179, 147, 89, 0.2);
        }

        .project-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .project-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #b39359;
            font-weight: 800;
        }

        .project-card p {
            font-size: 14px;
            line-height: 1.5;
            color: #cccccc;
        }

        footer {
            text-align: center;
            padding: 80px 20px;
            font-size: 11px;
            color: #8c8c8c;
        }

        /* Estilo do Banner que será usado na página de estoque */
        .hero-banner { 
            width: 100%; 
            height: 400px; 
            background-image: url('image.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            border-radius: 24px; 
            margin-bottom: 30px; 
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Fábio</h1>
        <p>EXPERT SOLUTIONS & MANAGEMENT</p>
    </header>

    <div class="container">
        <div class="projects-grid">
            
            <!-- Projeto Sollene Group -->
            <a href="estoque.html" class="project-card">
                <img src="image.jpg" alt="Sollene Group"> 
                <h3>Sollene Group</h3>
                <p>Terminal de logística premium para gestão de ativos globais.</p>
            </a>

            <!-- Card de Currículo -->
            <a href="resume.pdf" target="_blank" class="project-card">
                <h3>Currículo</h3>
                <p>Trajetória e especializações técnicas em TI.</p>
            </a>

        </div>
    </div>

    <footer>© 2026 FÁBIO — PRESTIGE IN TECHNOLOGY</footer>

</body>
</html>
