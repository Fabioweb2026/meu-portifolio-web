<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Tech Portfolio</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f1ea; /* O bege que combina com a imagem */
            color: #1a1a1a; 
            line-height: 1.6;
        }

        /* HEADER COM O VISUAL DA FOTO QUE VOCÊ MANDOU */
        .hero {
            width: 100%;
            height: 80vh; /* Ocupa quase a tela toda no topo */
            background: linear-gradient(to bottom, rgba(244, 241, 234, 0) 60%, #f4f1ea 100%), 
                        url('foto.fabio1.jpg') no-repeat center 20%;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
            padding-bottom: 40px;
        }

        .hero h1 { 
            font-size: 80px; 
            font-weight: 800; 
            color: #000000;
            letter-spacing: -4px;
            line-height: 0.8;
        }

        .hero p { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            color: #b39359; 
            font-weight: 800;
            margin-top: 20px;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* CARDS PRETOS EM HARMONIA */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #000000;
            border: 1px solid #b39359;
            border-radius: 24px;
            padding: 40px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.4s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .project-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(179, 147, 89, 0.2); }
        .project-card h3 { font-size: 22px; margin-bottom: 10px; color: #b39359; font-weight: 800; }
        .project-card p { font-size: 14px; color: #a3a3a3; }

        footer { text-align: center; padding: 80px 20px; font-size: 11px; color: #8c8c8c; letter-spacing: 3px; }

        @media(max-width: 768px) {
            .hero h1 { font-size: 50px; }
            .hero { height: 60vh; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Fábio</h1>
        <p>EXPERT SOLUTIONS & MANAGEMENT</p>
    </header>

    <div class="container">
        <div class="projects-grid">
            <a href="estoque.html" class="project-card">
                <h3>Sollene Group</h3>
                <p>Terminal de logística premium para gestão de ativos globais.</p>
            </a>
            <a href="resume.pdf" target="_blank" class="project-card">
                <h3>Currículo</h3>
                <p>Trajetória profissional e especializações técnicas.</p>
            </a>
            <a href="finance.html" class="project-card">
                <h3>Finanças</h3>
                <p>Dashboard de controle de capital e investimentos.</p>
            </a>
        </div>
    </div>

    <footer>© 2026 FÁBIO — PRESTIGE IN TECHNOLOGY</footer>

</body>
</html>
