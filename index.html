
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabio Web | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
    url('foto.fabio1.jpg') center/cover no-repeat;
    color: white;
    padding: 40px 20px;
}

/* TITLE */
h1 {
    text-align: center;
    color: #b39359;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* GRID */
.projects-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 22px;
    max-width: 1200px;
    margin: auto;
}

/* CARD BASE (premium feel) */
.card {
    width: 350px;
    background: rgba(26,26,26,0.95);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(179,147,89,0.25);
    transition: all 0.35s ease;
    position: relative;
}

/* HOVER PREMIUM (Apple/Stripe feel) */
.card:hover {
    transform: translateY(-10px);
    border-color: rgba(179,147,89,0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* IMAGES */
.card-img {
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: #111;
}

/* DEFAULT IMAGES */
.card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

/* zoom suave no hover */
.card:hover .card-img img {
    transform: scale(1.06);
}

/* 🔥 SOLLENE FIX PREMIUM (sem cortar texto + sem buraco branco) */
.card:nth-child(1) .card-img img {
    object-fit: contain;
    background: radial-gradient(circle, #1a1a1a, #0f0f0f);
    padding: 10px;
}

/* RESUME */
.resume-preview {
    width: 100%;
    height: 200px;
    position: relative;
    overflow: hidden;
    background: #111;
}

.resume-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.88;
    transition: 0.4s ease;
}

.card:hover .resume-image {
    transform: scale(1.05);
    opacity: 1;
}

/* CONTENT */
.card-content {
    padding: 20px;
    text-align: center;
}

.card h3 {
    color: #b39359;
    margin-bottom: 8px;
    font-weight: 600;
}

.card p {
    font-size: 14px;
    color: #dcdcdc;
}

/* 🔥 DESTAQUE NO MELHOR PROJETO (SOLLENE) */
.card:nth-child(1) {
    border: 1px solid rgba(179,147,89,0.6);
    box-shadow: 0 10px 25px rgba(179,147,89,0.08);
}

/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
    background: #b39359;
    color: white;
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.home-btn:hover {
    background: #8c6d3c;
}

/* 📱 MOBILE PREMIUM */
@media (max-width: 768px) {
    .projects-grid {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 92%;
    }
}
</style>
</head>

<body>

<a class="home-btn" href="https://fabioweb2026.github.io/portifolio-web/">
← Home
</a>

<h1>Web Portfolio</h1>

<div class="projects-grid">

    <!-- CARD 1 - SOLLENE (PRIORIDADE VISUAL) -->
    <div class="card" onclick="window.open('https://fabioweb2026.github.io/estoque.html/')">

        <div class="card-img">
            <img src="imagem.Sollene Group.png" alt="Sollene Group">
        </div>

        <div class="card-content">
            <h3>Sollene Group</h3>
            <p>Inventory system</p>
        </div>

    </div>

    <!-- CARD 2 -->
    <div class="card" onclick="window.open('https://fabioweb2026.github.io/malta.html/')">

        <div class="card-img">
            <img src="malta01.jpg.png" alt="Malta Project">
        </div>

        <div class="card-content">
            <h3>🌍 Malta Project</h3>
            <p>Global business platform</p>
        </div>

    </div>

    <!-- CARD 3 -->
    <div class="card" onclick="window.open('resume.pdf','_blank')">

        <div class="resume-preview">
            <img src="homem-trabalhao-TI.png" class="resume-image" alt="TI Professional">
        </div>

        <div class="card-content">
            <h3>📄 Resume</h3>
            <p>Professional CV</p>
        </div>

    </div>

</div>

</body>
</html>
