<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Portfólio Profissional</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f1ea; 
            color: #1a1a1a; 
        }

        /* SEÇÃO PRINCIPAL (HERO) - OCUPANDO MAIS ESPAÇO */
        .hero {
            width: 100%; 
            height: 95vh; /* Aumentado para ocupar quase toda a tela */
            background: linear-gradient(to bottom, rgba(244, 241, 234, 0) 40%, #f4f1ea 100%), 
                        url('img/foto.fabio1.jpg') no-repeat center center;
            background-size: cover; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            text-align: center; 
            padding-bottom: 80px; /* Mais espaço interno no rodapé da imagem */
        }

        .hero h1 { 
            font-size: clamp(60px, 10vw, 120px); /* Fonte responsiva: aumenta em telas grandes */
            font-weight: 800; 
            color: #000; 
            letter-spacing: -5px; 
            line-height: 0.8; 
        }

        .hero p { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            color: #b39359; 
            font-weight: 800; 
            margin-top: 20px; 
        }

        /* GRID DE PROJETOS */
        .container { 
            max-width: 1200px; 
            margin: -40px auto 50px; /* Sobe um pouco os cards para sobrepor levemente o hero */
            padding: 0 20px; 
            position: relative;
            z-index: 10;
        }

        .projects-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        .project-card {
            background: #000; 
            border: 1px solid #b39359; 
            border-radius: 28px; 
            padding: 35px;
            text-decoration: none; 
            color: #fff; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            flex-direction: column;
        }

        .project-card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 30px 60px rgba(179, 147, 89, 0.25); 
        }

        .project-card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 18px; 
            margin-bottom: 25px; 
            border: 1px solid #222; 
        }
        
        .project-card h3 { 
            font-size: 26px; 
            margin-bottom: 12px; 
            color: #b39359; 
            font-weight: 800; 
        }

        .project-card p { 
            font-size: 15px; 
            color: #aaa; 
            line-height: 1.6; 
        }

        footer { 
            text-align: center; 
            padding: 100px 20px; 
            font-size: 12px; 
            color: #8c8c8c; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Fábio</h1>
        <p>EXPERT SOLUTIONS & MANAGEMENT</p>
    </header>

    <div class="container">
        <div class="projects-grid">
            
            <!-- Projeto Sollene Group -->
            <a href="estoque.html" class="project-card">
                <img src="img/sollene-group.jpg" alt="Sollene Group"> 
                <h3>Sollene Group</h3>
                <p>Terminal de logística premium para gestão de ativos globais e inteligência comercial.</p>
            </a>

            <!-- Card de Currículo -->
            <a href="resume.pdf" target="_blank" class="project-card">
                <img src="img/cv-preview.jpg" alt="Currículo" style="filter: grayscale(1);"> <!-- Opcional: Adicione uma imagem para o CV também -->
                <h3>Currículo</h3>
                <p>Trajetória profissional e especializações em TI e gestão de ativos.</p>
            </a>

        </div>
    </div>

    <footer>© 2026 FÁBIO — PRESTIGE IN TECHNOLOGY</footer>

</body>
</html>
