<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabio Web | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('foto.fabio1.jpg') center/cover no-repeat;
    color: white;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    color: #b39359;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* GRID */
.projects-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1200px;
    margin: auto;
}

/* CARD */
.card {
    width: 350px;
    background: rgba(26,26,26,0.95);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(179,147,89,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    border-color: #b39359;
}

/* IMAGEM HARMONIZADA */
.card-img {
    width: 100%;
    height: 200px;
    overflow: hidden;
}

.card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.card-content {
    padding: 20px;
    text-align: center;
}

.card h3 {
    color: #b39359;
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #ddd;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal-box {
    width: 95%;
    height: 90%;
    background: #fff;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 30px;
    cursor: pointer;
    color: black;
}
</style>
</head>

<body>

<h1>Web Portfolio</h1>

<div class="projects-grid">

    <!-- CARD 1 -->
    <div class="card" onclick="openPage('https://Fabioweb2026.github.io/estoque.html/')">

        <div class="card-img">
            <img src="imagem.Sollene Group.png" alt="Sollene Group">
        </div>

        <div class="card-content">
            <h3>Sollene Group</h3>
            <p>Inventory system</p>
        </div>

    </div>

    <!-- CARD 2 (MALTA COM IMAGEM NOVA) -->
    <div class="card" onclick="openPage('https://Fabioweb2026.github.io/malta.html/')">

        <div class="card-img">
            <img src="malta01.jpg.png" alt="Malta Project">
        </div>

        <div class="card-content">
            <h3>🌍 Malta Project</h3>
            <p>Global business platform</p>
        </div>

    </div>

    <!-- CARD 3 -->
    <div class="card" onclick="window.open('resume.pdf','_blank')">

        <div class="card-content">
            <h3>📄 Resume</h3>
            <p>Professional CV</p>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closePage()">×</span>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
function openPage(url){
    document.getElementById('frame').src = url;
    document.getElementById('modal').style.display = 'flex';
}

function closePage(){
    document.getElementById('frame').src = '';
    document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
