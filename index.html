<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Portfólio</title>
    <style>
        @import url('https://googleapis.com');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; text-align: center; }
        .hero { width: 100%; height: 80vh; background: linear-gradient(to bottom, rgba(0,0,0,0.1), #000), url('foto.fabio1.jpg') no-repeat center center; background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px; }
        .hero h1 { font-size: 80px; font-weight: 800; margin: 0; }
        .hero p { color: #f1c40f; letter-spacing: 5px; font-weight: 800; }
        .projects { padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 20px; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { border-color: #f1c40f; transform: translateY(-5px); }
        .card h3 { color: #f1c40f; margin-bottom: 15px; }
        .btn { background: #f1c40f; color: #000; padding: 10px 30px; border-radius: 10px; display: inline-block; margin-top: 20px; font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Fábio</h1>
        <p>EXPERT SOLUTIONS & MANAGEMENT</p>
    </div>
    <div class="projects">
        <a href="estoque.html" class="card">
            <h3>Sollene Group</h3>
            <p>Sistema de estoque premium.</p>
            <div class="btn">Ver Projeto</div>
        </a>
        <a href="malta.html" class="card">
            <h3>Projeto Malta</h3>
            <p>Galeria da cafeteria Giorgios.</p>
            <div class="btn">Ver Projeto</div>
        </a>
        <a href="resume.pdf" target="_blank" class="card">
            <h3>Currículo</h3>
            <p>Trajetória profissional em TI.</p>
            <div class="btn">Abrir PDF</div>
        </a>
    </div>
    <p style="padding: 50px; color: #444; font-size: 10px;">© 2026 FÁBIO</p>
</body>
</html>
