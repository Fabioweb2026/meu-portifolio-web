<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* CONFIGURAÇÕES GERAIS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfcf0; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; }
        
        /* BANNER SUPERIOR */
        .banner-header { width: 100%; height: 9.5cm; margin-top: 0.5cm; background-color: #fdfcf0; overflow: hidden; display: flex; justify-content: center; }
        .banner-header img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* NAVEGAÇÃO */
        .nav-top { width: 100%; max-width: 1400px; padding: 15px 20px; }
        .btn-back { text-decoration: none; color: #b39359; border: 1px solid #b39359; padding: 6px 15px; border-radius: 50px; font-size: 10px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-back:hover { background: #b39359; color: white; }

        /* CONTEÚDO PRINCIPAL (SIDEBAR + TABELA) */
        .main-content { display: flex; width: 100%; max-width: 1400px; gap: 20px; padding: 0 20px 60px; flex: 1; }

        /* SIDEBAR PRETA */
        .sidebar { width: 320px; background-color: #1a1a1a; color: #b39359; padding: 25px; border-radius: 15px; border: 1px solid rgba(179, 147, 89, 0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        label { font-size: 9px; text-transform: uppercase; color: #888; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; font-size: 12px; background: white; color: #000; }

        .btn-add { width: 100%; padding: 14px; background-color: #b39359; color: #1a1a1a; border: none; font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-clear { width: 100%; padding: 8px; background: transparent; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 8px; margin-top: 10px; font-size: 9px; cursor: pointer; text-transform: uppercase; }

        /* TABELA */
        .table-container { flex: 1; background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(179, 147, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        thead { background-color: #000; color: #b39359; }
        th, td { padding: 12px; text-align: center; font-size: 11px; border-bottom: 1px solid #f2f2f2; }
        
        /* CORES FINANCEIRAS */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-green { background-color: #27ae60; }
        .dot-brown { background-color: #b39359; }
        .revenue-val { color: #27ae60 !important; font-weight: 800; } 
        .profit-val { color: #b39359 !important; font-weight: 800; } 
        .inv-val { color: #2980b9 !important; font-weight: bold; font-size: 11px; }

        @media (max-width: 1100px) { .main-content { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body onload="loadInventory()">

    <header class="banner-header">
        <img src="imagem.Sollene Group.png" alt="Sollene Group Banner">
    </header>

    <nav class="nav-top">
        <a href="index.html" class="btn-back">← Back to Portfolio</a>
    </nav>

    <main class="main-content">
        <section class="sidebar">
            <h2>Register Item</h2>
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="Ex: Coffee">
            
            <label>Unit</label>
            <select id="pUnit"><option>Caixas</option><option>Kg</option><option>Tons</option></select>
            
            <label>In / Out</label>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="pEntry" placeholder="In">
                <input type="number" id="pExit" placeholder="Out">
            </div>

            <label>Cost & Price (€)</label>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="pBuyPrice" placeholder="Cost">
                <input type="number" id="pSellPrice" placeholder="Price">
            </div>

            <button class="btn-add" onclick="addProduct()">Process Trade</button>
            <button class="btn-clear" onclick="clearAll()">Reset List</button>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>STOCK</th>
                        <th>COST</th>
                        <th>PRICE</th>
                        <th>REVENUE</th>
                        <th>PROFIT</th>
                        <th>INV. VALUE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>
    </main>

    <script>
        function saveInventory() { localStorage.setItem("solleneInventoryHTML", document.getElementById('inventoryBody').innerHTML); }
        function loadInventory() { const saved = localStorage.getItem("solleneInventoryHTML"); if (saved) document.getElementById('inventoryBody').innerHTML = saved; }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = Number(document.getElementById('pEntry').value) || 0;
            const exit = Number(document.getElementById('pExit').value) || 0;
            const buyPrice = Number(document.getElementById('pBuyPrice').value) || 0;
            const sellPrice = Number(document.getElementById('pSellPrice').value) || 0;

            if (!name || buyPrice === 0) return alert("Fill Name and Cost");

            const stock = entry - exit;
            const revenue = exit * sellPrice; 
            const profit = (sellPrice - buyPrice) * exit;
            const invVal = stock * sellPrice;

            const table = document.getElementById('inventoryBody');
            const row = table.insertRow();

            row.innerHTML = `
                <td>${name}</td><td>${unit}</td><td style="font-weight:bold;">${stock}</td>
                <td>€ ${buyPrice.toFixed(2)}</td><td>€ ${sellPrice.toFixed(2)}</td>
                <td class="revenue-val"><span class="status-dot dot-green"></span>€ ${revenue.toFixed(2)}</td>
                <td class="profit-val"><span class="status-dot dot-brown"></span>€ ${profit.toFixed(2)}</td>
                <td class="inv-val">€ ${invVal.toFixed(2)}</td>
                <td><button style="color:red; border:none; background:none; cursor:pointer;" onclick="this.closest('tr').remove(); saveInventory();">Del</button></td>
            `;
            saveInventory();
            
            // Limpar campos
            document.getElementById('pName').value = "";
            document.getElementById('pEntry').value = "";
            document.getElementById('pExit').value = "";
            document.getElementById('pBuyPrice').value = "";
            document.getElementById('pSellPrice').value = "";
        }

        function clearAll() { if (confirm("Clear all?")) { document.getElementById('inventoryBody').innerHTML = ""; localStorage.removeItem("solleneInventoryHTML"); } }
    </script>
</body>
</html>
