<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fábio Web | Portfólio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0b0b0b;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px 40px;
}

.hero h1 {
    font-size: 42px;
    color: #b39359;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.6;
    font-size: 14px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px 80px;
}

/* CARD */
.card {
    background: #151515;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.35s ease;
    border: 1px solid rgba(179,147,89,0.15);
    position: relative;
}

.card:hover {
    transform: translateY(-10px);
    border-color: #b39359;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    transition: 0.4s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.card-content {
    padding: 18px;
    text-align: center;
}

.card h3 {
    color: #b39359;
    margin-bottom: 6px;
    font-size: 18px;
}

.card p {
    font-size: 12px;
    opacity: 0.6;
}

.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #b39359;
    color: black;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 50px;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="hero">
    <h1>Fábio Web</h1>
    <p>Portfólio profissional • Web Developer</p>
</div>

<div class="grid">

    <div class="card" onclick="window.location.href='malta.html'">
        <span class="badge">Projeto</span>
        <img src="malta01.jpeg">
        <div class="card-content">
            <h3>Malta Experience</h3>
            <p>Landing page turística</p>
        </div>
    </div>

</div>

</body>
</html>
