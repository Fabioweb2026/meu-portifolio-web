<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portfolio | Fábio Frontend</title>
    <style>
        /* DIRETRIZES EXATAS DO SEU LAYOUT PREMIUM ESCURO MANTIDAS INTEGRALMENTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background: #121214 url('image.png') no-repeat center center fixed; 
            background-size: cover;
            color: #f5f5f7; 
            padding-bottom: 60px; 
            overflow-x: hidden; 
        }

        /* BOTÃO HOME NO CANTO SUPERIOR ESQUERDO */
        .btn-home-top {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #b5a48b;
            color: #121214;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-home-top:hover { background: #fff; }

        /* TÍTULO PRINCIPAL DO SEU PORTFÓLIO */
        .portfolio-title {
            text-align: center; font-size: 32px; font-weight: 800; color: #b5a48b; 
            letter-spacing: 4px; text-transform: uppercase; margin: 80px 0 40px 0;
        }

        /* CONTAINER CENTRALIZADO HARMÔNICO PARA OS 2 CARDS */
        .dashboard-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 4%; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 35px; 
            align-items: start;
        }
        
        /* CARDS BLACK FOSCOS TRANSLÚCIDOS DO SEU LAYOUT ORIGINAL */
        .panel-card { 
            background: rgba(28, 28, 31, 0.85); 
            border: 1px solid #2a2a32; 
            border-radius: 20px; 
            padding: 0; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: center;
            transition: 0.3s ease;
            text-decoration: none; 
            color: inherit;
            height: 100%;
        }
        .panel-card:hover { transform: translateY(-8px); border-color: #b5a48b; box-shadow: 0 20px 40px rgba(181,164,139,0.15); }

        /* RECIPIENTE DA IMAGEM SUPERIOR DO CARD */
        .card-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #121214;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #2a2a32;
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        /* TEXTOS CENTRALIZADOS */
        .card-text-area { padding: 25px 20px; }
        .card-text-area h3 { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; letter-spacing: 0.5px; }
        .card-text-area p { font-size: 13px; color: #a0a0ab; font-weight: 500; }
    </style>
</head>
<body>

    <!-- BOTÃO HOME DE RETORNO DO SEU LAYOUT -->
    <a href="#" class="btn-home-top">← Home</a>

    <!-- WEB PORTFOLIO MAIN HEADER -->
    <h1 class="portfolio-title">WEB PORTFOLIO</h1>

    <!-- VITRINE DE PROJETOS UNIFICADA COM A SUBSTITUIÇÃO SOLICITADA -->
    <main class="dashboard-container">
        
        <!-- CARD 1: AJUSTADO PARA A TAG EXATA SOLICITADA POR VOCÊ -->
        <a href="estoque.html" target="_blank" class="panel-card">
            <div class="card-img-wrapper">
                <img src="imagem.Sollene Group.png" class="card-img" onerror="this.src='giorgios.png'">
            </div>
            <div class="card-text-area">
                <h3>Sollene Group</h3>
                <p>Inventory system</p>
            </div>
        </a>

        <!-- CARD 2: MALTA PROJECT -->
        <a href="malta.html" target="_blank" class="panel-card">
            <div class="card-img-wrapper">
                <img src="giorgios.png" class="card-img">
            </div>
            <div class="card-text-area">
                <h3>Malta Project</h3>
                <p>Global business platform</p>
            </div>
        </a>

    </main>

</body>
</html>
