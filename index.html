<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Web Developer</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #764ba2; color: white; text-align: center; }
        .container { padding: 50px 20px; }
        .card-area { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { background: white; color: #333; padding: 25px; border-radius: 12px; width: 260px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .btn { display: inline-block; background: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        img { width: 60px; height: 60px; margin-bottom: 15px; object-fit: contain; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .about-text { max-width: 600px; margin: 0 auto 30px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fábio 👨‍💻</h1>
        <p class="about-text">IT Student & Aspiring Web Developer | Transitioning from Education Management to Technology.</p>
        
        <div class="card-area">
            <!-- CARD 1: CURRÍCULO -->
            <div class="card">
                <img src="https://flaticon.com" alt="Resume">
                <h3>Resume</h3>
                <p>Professional background in English.</p>
                <a href="resume.pdf" target="_blank" class="btn">Open PDF</a>
            </div>
            
            <!-- CARD 2: O PROJETO QUE VOCÊ ABRIU -->
            <div class="card">
                <img src="https://flaticon.com" alt="Task Master">
                <h3>Task Master</h3>
                <p>Interactive To-Do List with JavaScript.</p>
                <a href="todo.html" class="btn">Live Demo</a>
            </div>

            <!-- CARD 3: GITHUB -->
            <div class="card">
                <img src="https://flaticon.com" alt="GitHub">
                <h3>My GitHub</h3>
                <p>Check my code and repositories.</p>
                <a href="https://github.com" target="_blank" class="btn">View Profile</a>
            </div>
        </div>
    </div>
</body>
</html>
