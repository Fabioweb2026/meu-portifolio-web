<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta Project</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('malta01.jpeg') center/cover no-repeat;
    color: white;
    min-height: 100vh;
}

/* TOP BAR */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* BACK BUTTON */
.back-btn {
    text-decoration: none;
    color: white;
    background: #b39359;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    background: #8c6d3c;
}

/* CONTENT */
.container {
    padding-top: 100px;
    max-width: 1000px;
    margin: auto;
    text-align: center;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
    color: #b39359;
}

p {
    font-size: 18px;
    color: #ddd;
    margin-bottom: 30px;
}

/* IMAGE SECTION */
.hero-img {
    width: 100%;
    max-width: 800px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.hero-img img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<!-- BACK BUTTON FIXO -->
<div class="top-bar">
    <a class="back-btn" href="https://fabioweb2026.github.io/portifolio-web/">
        ← Back to Portfolio
    </a>
</div>

<!-- CONTEÚDO -->
<div class="container">

    <h1>Malta Project</h1>
    <p>Global Business Platform</p>

    <div class="hero-img">
        <img src="malta01.jpeg" alt="Malta Project">
    </div>

</div>

</body>
</html>
