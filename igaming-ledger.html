<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - AAA+ UI</title>
    <!-- Carregando React e ReactDOM via CDN de forma segura -->
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <!-- Babel para compilar JSX no navegador (Apenas para simulação/desenvolvimento) -->
    <script src="https://unpkg.com"></script>

    <style>
        /* =====================================================
           2. AAA+ CASINO UI STYLE (CSS - PREMIUM DESIGN)
           ===================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1f, #0b0b10);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #111;
            border-bottom: 2px solid gold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
            border-radius: 4px;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: gold;
            letter-spacing: 1px;
        }

        .balance {
            font-size: 18px;
            color: #4ade80;
            font-weight: 600;
            background: rgba(74, 222, 128, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            padding: 20px;
        }

        .slot-machine {
            display: flex;
            gap: 20px;
            font-size: 80px;
            background: #111;
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid #222;
            box-shadow: 0 0 50px rgba(255,215,0,0.15);
            margin-bottom: 40px;
        }

        .reel {
            width: 120px;
            text-align: center;
            background: #17171c;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #333;
            transition: all 0.1s ease;
        }

        .reel.spinning {
            animation: glow 0.1s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px gold; transform: translateY(-2px); }
            to { text-shadow: 0 0 25px gold; transform: translateY(2px); }
        }

        .spin-btn {
            padding: 18px 60px;
            font-size: 20px;
            background: linear-gradient(185deg, #ffe066, #f5b000);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 6px 20px rgba(245, 176, 0, 0.4);
            transition: all 0.2s ease;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 176, 0, 0.6);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .spin-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- =====================================================
       1. AAA+ VISUAL FRONTEND (REACT - CASINO UI)
       ===================================================== -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CasinoApp() {
            const [balance, setBalance] = useState(1000);
            const [slot, setSlot] = useState(["❔", "❔", "❔"]);
            const [spinning, setSpinning] = useState(false);
            
            const symbols = ["🍒", "💎", "🔔", "7️⃣", "⭐", "🍀"];
            const intervalRef = useRef(null); // Ref para evitar vazamento de memória

            // Limpeza preventiva de memória caso o componente desmonte
            useEffect(() => {
                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, []);

            function spin() {
                if (spinning) return;
                
                setSpinning(true);

                // Animação visual local (Roleta rodando rápido)
                intervalRef.current = setInterval(() => {
                    setSlot([
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)]
                    ]);
                }, 100);

                // Simulação de resposta segura do Servidor após 2 segundos
                setTimeout(() => {
                    if (intervalRef.current) clearInterval(intervalRef.current);

                    // Resultado definitivo gerado estritamente do "lado do servidor" fictício
                    const finalResult = [
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)]
                    ];

                    setSlot(finalResult);

                    // Validação de regras de vitória (3 símbolos iguais)
                    const isWin = finalResult[0] === finalResult[1] && finalResult[1] === finalResult[2];

                    if (isWin) {
                        setBalance(prev => prev + 200);
                    } else {
                        setBalance(prev => prev - 50);
                    }

                    setSpinning(false);
                }, 2000);
            }

            return (
                <div className="casino-container">
                    <header className="topbar">
                        <div className="brand-container">
                            {/* Logo inserida conforme solicitado. Certifique-se de que a imagem está na mesma pasta. */}
                            <img 
                                src="mediterranea.png.png" 
                                alt="Mediterranea Logo" 
                                className="brand-logo"
                                onError={(e) => {
                                    e.target.style.display = 'none'; // Esconde a tag caso a imagem ainda não exista na pasta
                                }}
                            />
                            <div className="brand">Mediterranea Casino</div>
                        </div>
                        <div className="balance">Balance: €{balance}</div>
                    </header>

                    <main className="game-area">
                        <div className="slot-machine">
                            <div className={`reel ${spinning ? 'spinning' : ''}`}>{slot[0]}</div>
                            <div className={`reel ${spinning ? 'spinning' : ''}`}>{slot[1]}</div>
                            <div className={`reel ${spinning ? 'spinning' : ''}`}>{slot[2]}</div>
                        </div>

                        <button onClick={spin} disabled={spinning} className="spin-btn">
                            {spinning ? "SPINNING..." : "SPIN"}
                        </button>
                    </main>
                </div>
            );
        }

        // Renderização na div Root
        const root = React盤DOM.createRoot(document.getElementById('root'));
        root.render(<CasinoApp />);
    </script>
</body>
</html>
