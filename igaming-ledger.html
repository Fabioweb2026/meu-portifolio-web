<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - Enterprise Operational Monitor (Malta)</title>
    <style>
        /* =====================================================
           PALETA MEDITERRÂNEA CORPORATIVA: BEGE, AZUL E OURO
           ===================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f7f5f0 0%, #e8e2d5 100%);
            min-height: 100vh;
            color: #1c2d42;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* BARRA SUPERIOR CORPORATIVA */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #0a1e38;
            border-bottom: 4px solid #c5a059;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            color: #ffffff;
        }

        .brand-details h1 {
            font-size: 22px;
            font-weight: 800;
            color: #e5c17d;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand-details p {
            font-size: 11px;
            color: #a2b7d4;
        }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .license-badge {
            font-size: 11px;
            background: rgba(197, 160, 89, 0.15);
            border: 1px solid #c5a059;
            color: #e5c17d;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .balance-box {
            background: #112d52;
            padding: 10px 20px;
            border-radius: 8px;
            border-left: 4px solid #52e08e;
        }

        .balance-label {
            font-size: 10px;
            color: #a2b7d4;
            text-transform: uppercase;
        }

        .balance-value {
            font-size: 20px;
            color: #52e08e;
            font-weight: 700;
        }

        /* LAYOUT TRIPLE-SPLIT */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 400px;
            gap: 20px;
            padding: 20px;
            flex: 1;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #dcd6cd;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
        }

        .panel-title {
            color: #0a1e38;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #e8e2d5;
            padding-bottom: 10px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 11px;
            color: #627285;
            text-transform: uppercase;
            font-weight: 700;
        }

        .control-group select, .control-group input {
            background: #fcfbfa;
            border: 1px solid #ccd1d9;
            color: #1c2d42;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        /* ÁREA CENTRAL DE JOGO */
        .game-center {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-screen {
            background: #0a1e38;
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #c5a059;
            min-height: 380px;
            color: #ffffff;
        }

        /* MOTORES VISUAIS DINÂMICOS */
        .engine-view { display: none; width: 100%; text-align: center; }
        .engine-view.active { display: block; }

        .slot-machine {
            display: inline-flex;
            gap: 15px;
            background: #061324;
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid #c5a059;
            margin-bottom: 20px;
        }

        .reel {
            width: 90px;
            height: 90px;
            font-size: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .table-simulation {
            background: #0d4223;
            border: 4px dashed #c5a059;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        .action-btn {
            padding: 15px 50px;
            font-size: 16px;
            background: linear-gradient(180deg, #d8b467 0%, #b38f43 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(179, 143, 67, 0.4);
        }

        /* 📱 TELA PEQUENA DO JOGADOR (HUD MOBILE-SIMULATED) */
        .player-hud-container {
            background: #ffffff;
            border: 2px solid #0a1e38;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .hud-screen {
            background: #1e293b;
            color: #38bdf8;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.2);
            padding-bottom: 4px;
        }

        /* AUDITORIA EM TEMPO REAL */
        .live-monitor {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
        }

        .log-card {
            background: #fdfcf9;
            border: 1px solid #e1dbd0;
            border-left: 4px solid #0a1e38;
            border-radius: 6px;
            padding: 10px;
            font-size: 11px;
        }

        .log-card.win { border-left-color: #52e08e; background: #f4fdf7; }
        .log-card.loss { border-left-color: #e05252; background: #fdf5f5; }

        .hash-verifiable {
            font-family: monospace;
            background: #eef2f7;
            padding: 4px;
            border-radius: 4px;
            color: #51637a;
            font-size: 9px;
            word-break: break-all;
            margin-top: 5px;
        }

        .db-badge {
            background: #e2e8f0;
            color: #475569;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand-details">
            <h1>Mediterranea Corporate</h1>
            <p>Enterprise Risk & Compliance Infrastructure</p>
        </div>
        <div class="stats-container">
            <div class="license-badge">MGA/B2C/213/2026 • Malta Jurisdiction</div>
            <div class="balance-box">
                <p class="balance-label">Livro Contábil Global (EUR)</p>
                <p class="balance-value" id="global-ledger-display">€100,000.00</p>
            </div>
        </div>
    </header>

    <main class="main-layout">

        <!-- PAINEL 1: PARAMETRIZAÇÃO -->
        <section class="panel">
            <h2 class="panel-title">Parâmetros de Risco (MGA)</h2>
            <div class="control-group">
                <label>Identificador do Jogador</label>
                <input type="text" id="player-id" value="PLY_MALTA_9921" readonly>
            </div>
            <div class="control-group">
                <label>Seleção de Jogo Ativo</label>
                <select id="game-select" onchange="switchGameEngine()">
                    <option value="slots">🎰 Azure Coast Slots (RTP 96.4%)</option>
                    <option value="roulette">🎡 Valletta Premium Roulette (RTP 97.3%)</option>
                    <option value="blackjack">🃏 Gozo Grand Blackjack (RTP 99.5%)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Valor da Aposta (€)</label>
                <input type="number" id="bet-amount" value="10" min="1" max="500">
            </div>
            <div class="control-group">
                <label>Status do Banco de Dados</label>
                <div><span class="db-badge">LOCALSTORAGE CONNECTED (SQL-MOCK)</span></div>
            </div>
        </section>

        <!-- PAINEL 2: ENGINE DE JOGOS CORRIGIDA -->
        <section class="game-center">
            <div class="game-screen">
                
                <!-- ENGINE SLOTS -->
                <div id="engine-slots" class="engine-view active">
