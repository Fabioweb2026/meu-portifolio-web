<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene iGaming | Operator Risk & Player Ledger</title>
    <style>
        /* DESIGN MINIMALISTA LUXO COM TÍTULOS EM BLACK ELEGANTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #fbf9f6; color: #1a1a1a; padding-bottom: 60px; }

        /* MANTÉM A PROPORÇÃO REAL DO BANNER COM BASE NA SUA IMAGEM DO REPOSITÓRIO */
        .hero-top-banner {
            width: 100%;
            aspect-ratio: 1920 / 480; 
            background: #000000 url('sollene-group.jpg') no-repeat center top;
            background-size: 100% 100%; 
            border-bottom: 3px solid #7a5c33;
        }

        /* HEADER PREMIUM SOLLENE REESTILIZADO (BLACK & PREMIUM GOLD) */
        .main-header {
            background: #000000; display: flex; align-items: center; justify-content: space-between;
            padding: 12px 5%; border-bottom: 1px solid #7a5c33; position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        
        .logo-wrapper {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: transparent; border: 1.5px solid #d4af37; border-radius: 50%;
        }
        .logo-premium-svg { width: 16px; height: 16px; fill: #d4af37; display: block; }
        
        .brand-title { font-size: 18px; font-weight: 800; color: #ffffff; letter-spacing: 4px; text-transform: uppercase; }
        .brand-title span { color: #d4af37; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-back-portfolio { text-decoration: none; color: #d4af37; border: 1px solid #7a5c33; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-back-portfolio:hover { background: #7a5c33; color: #fff; }
        
        .btn-clear-cache { background: #ea4335; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-clear-cache:hover { background: #fff; color: #ea4335; }

        /* CAIXA COM DADOS DE AUDITORIA E MGA COMPLIANCE */
        .corporate-info-box { max-width: 1750px; margin: 25px auto 5px auto; padding: 0 2%; width: 100%; }
        .info-card-inner {
            background: #111115; border: 2px solid #7a5c33; border-radius: 12px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .info-block { display: flex; flex-direction: column; }
        .info-block span { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #7a5c33; letter-spacing: 1px; margin-bottom: 2px; }
        .info-block p { font-size: 12px; font-weight: bold; color: #ffffff; letter-spacing: 0.5px; }

        /* CONTAINER OPERACIONAL */
        .dashboard-container { 
            max-width: 1750px; margin: 20px auto; padding: 0 2%; 
            display: grid; grid-template-columns: 340px 1fr; gap: 25px; align-items: start;
        }
        
        .panel-card { background: #ffffff; border: 2px solid #7a5c33; border-radius: 16px; padding: 14px; box-shadow: 0 10px 25px rgba(122,92,51,0.05); overflow: hidden; }
        .panel-card h2, .unified-header-black { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 2px; 
            color: #d4af37; background: #000000; padding: 12px; margin: -14px -14px 12px -14px;
            font-weight: 800; text-align: center; border-bottom: 2px solid #7a5c33;
        }
        
        .form-group { margin-bottom: 6px; } 
        .form-group label { display: block; font-size: 8.5px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; color: #7a5c33; letter-spacing: 0.5px; white-space: nowrap; }
        .form-control { width: 100%; padding: 6px 8px; border: 1px solid #e1dbcf; border-radius: 6px; font-size: 12px; font-weight: 600; outline: none; background: #fdfaf6; color: #1a1a1a; height: 34px; }
        .form-row { display: flex; gap: 6px; align-items: flex-end; width: 100%; }
        .col-qty { flex: 0.9; min-width: 50px; }
        .col-price { flex: 1.1; min-width: 75px; }

        .btn-submit { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; height: 38px; }
        .btn-submit:hover { background: #7a5c33; }

        .unified-hub-container { background: #ffffff; border: 2px solid #7a5c33; border-radius: 16px; box-shadow: 0 10px 25px rgba(122,92,51,0.05); overflow: hidden; padding: 14px; }
        .unified-hub-container .unified-header-black { margin: -14px -14px 15px -14px; }
        
        .table-container-fixed { width: 100%; overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; color: #1a1a1a; table-layout: auto; }
        th { background: #fdfaf6; padding: 10px 8px; font-weight: 800; text-transform: uppercase; font-size: 9.5px; color: #7a5c33; border-bottom: 2px solid #7a5c33; letter-spacing: 0.5px; }
        td { padding: 10px 8px; border-bottom: 1px solid #f4f0e8; font-weight: 600; }
        
        .embedded-stock-panel { background: #fdfaf6; border: 1px solid #e1dbcf; border-radius: 10px; padding: 15px; width: 100%; }
        .embedded-stock-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #7a5c33; border-bottom: 2px solid #7a5c33; padding-bottom: 5px; margin-bottom: 10px; font-weight: 800; text-align: left; }
        
        .stock-items-flex { display: flex; flex-wrap: wrap; gap: 12px; }
        .stock-item-row { display: flex; align-items: center; gap: 10px; background: #fff; padding: 6px 12px; border: 1px solid #e1dbcf; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .stock-qty-badge { background: #7a5c33; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; display: inline-block; text-align: center; min-width: 75px; }
        .badge-profit { background: #e6f4ea; color: #137333; }
        .badge-loss { background: #fce8e6; color: #c5221f; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        @media(max-width: 1024px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- BANNER PANORÂMICO -->
    <section class="hero-top-banner"></section>

    <!-- SOLLENE EUROPEAN HEADER -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo-wrapper">
                <svg class="logo-premium-svg" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16h-2v-2h2v2zm1.07-7.75l-.9.92C12.45 11.9 12 12.5 12 14h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                </svg>
            </div>
            <h1 class="brand-title">Sollene <span>Gaming</span></h1>
        </div>
        <div class="header-actions">
            <!-- Retorna de forma limpa para a home do portfólio -->
            <a href="index.html" class="btn-back-portfolio">Portfolio</a>
            <button class="btn-clear-cache" id="clearCacheBtn">Clear Ledger</button>
        </div>
    </header>

    <!-- METADADOS DE CONTROLE DE RISCO E JURISDIÇÃO DE MALTA -->
    <section class="corporate-info-box">
        <div class="info-card-inner">
            <div class="info-block">
                <span>Licensing Jurisdiction</span>
                <p>Malta Gaming Authority (MGA)</p>
            </div>
            <div class="info-block">
                <span>System Status</span>
                <p style="color: #137333;">● SECURE / AUDITED</p>
            </div>
            <div class="info-block">
                <span>Compliance Code</span>
                <p>MGA/B2C/1581/2026</p>
            </div>
        </div>
    </section>

    <!-- CORE DE PROCESSAMENTO TÉCNICO -->
    <main class="dashboard-container">
        
        <!-- ENTRADA DE FORMULÁRIO -->
        <section class="panel-card">
            <h2>Transaction Entry</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label for="playerID">Player Reference / ID</label>
                    <input type="text" id="playerID" class="form-control" placeholder="EX: PLAYER_777" required>
                </div>
                <div class="form-group">
                    <label for="gameType">Product / Game Type</label>
                    <select id="gameType" class="form-control">
                        <option value="Live Casino">Live Casino</option>
                        <option value="Online Slots">Online Slots</option>
                        <option value="Sportsbook">Sportsbook</option>
                        <option value="Crash Games">Crash Games</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Financial Breakdown</label>
                    <div class="form-row">
                        <div class="col-qty">
                            <label for="betAmount">Bet (€)</label>
                            <input type="number" id="betAmount" class="form-control" min="1" placeholder="10" required>
