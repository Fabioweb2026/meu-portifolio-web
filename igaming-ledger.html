<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - Enterprise Operational Monitor</title>
    <style>
        /* =====================================================
           MEDITERRANEA BRANDING: ROYAL NAVY BLUE & MATTE GOLD
           ===================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top, #0a1128, #02040a);
            min-height: 100vh;
            color: #f0f4f8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* BARRA SUPERIOR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(4, 11, 31, 0.95);
            border-bottom: 3px solid #c5a059;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
            border-radius: 6px;
            border: 1px solid #c5a059;
        }

        .brand {
            font-size: 26px;
            font-weight: 800;
            color: #c5a059;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .session-timer {
            font-size: 14px;
            color: #8da2bb;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .balance {
            font-size: 20px;
            color: #52e08e;
            font-weight: 700;
            background: rgba(82, 224, 142, 0.08);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(82, 224, 142, 0.25);
            box-shadow: 0 0 20px rgba(82, 224, 142, 0.1);
        }

        /* LAYOUT CORPORATIVO TRIPLE-SPLIT */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 25px;
            padding: 30px;
            flex: 1;
            width: 100%;
            margin: 0 auto;
        }

        /* PAINEL LATERAL 1: CONFIGURAÇÕES E PARÂMETROS */
        .compliance-panel {
            background: #060d1f;
            border: 1px solid #142347;
            border-radius: 16px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .compliance-panel h3 {
            color: #c5a059;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #142347;
            padding-bottom: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            font-size: 12px;
            color: #8da2bb;
            text-transform: uppercase;
            font-weight: 600;
        }

        .control-group select, .control-group input {
            background: #020612;
            border: 1px solid #1d3366;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .control-group select:focus, .control-group input:focus {
            border-color: #c5a059;
        }

        /* PAINEL CENTRAL: INTERFACE DA MÁQUINA */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #030816;
            border-radius: 16px;
            border: 1px solid #101c3a;
            padding: 40px;
            position: relative;
        }

        .slot-machine {
            display: flex;
            gap: 25px;
            background: #01030a;
            padding: 35px 50px;
            border-radius: 28px;
            border: 2px solid #1d3366;
            box-shadow: 0 0 60px rgba(197, 160, 89, 0.15);
            margin-bottom: 45px;
        }

        .reel {
            width: 130px;
            height: 130px;
            font-size: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #050b1a, #0b1530);
            border-radius: 20px;
            border: 1px solid #223a73;
            transition: all 0.1s ease;
            user-select: none;
        }

        .reel.spinning {
            animation: blurGlow 0.08s infinite alternate;
        }

        @keyframes blurGlow {
            from { text-shadow: 0 0 15px #c5a059; transform: translateY(-5px); filter: blur(1px); }
            to { text-shadow: 0 0 35px #c5a059; transform: translateY(5px); filter: blur(3px); }
        }

        .spin-btn {
            padding: 22px 90px;
            font-size: 24px;
            background: linear-gradient(185deg, #f3d498, #c5a059);
            color: #02040a;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(197, 160, 89, 0.5);
        }

        .spin-btn:disabled {
            background: #121a2e;
            color: #405275;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* PAINEL LATERAL 2: TELÃO DE DADOS EM TEMPO REAL */
        .live-stream-panel {
            background: #060d1f;
            border: 1px solid #142347;
            border-radius: 16px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .live-stream-panel h3 {
            color: #c5a059;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #142347;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: #52e08e;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; box-shadow: 0 0 2px #52e08e; }
            to { opacity: 1; box-shadow: 0 0 10px #52e08e; }
        }

        .stream-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 480px;
            padding-right: 5px;
        }

        .stream-card {
            background: #020612;
            border: 1px solid #101c3a;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
            border-left: 3px solid #c5a059;
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .stream-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .player-name { color: #8da2bb; }
        .game-type {
            font-size: 11px;
            background: #142347;
            color: #c5a059;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .stream-body {
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
        }

        .player-bet { color: #f87171; }
        .player-wallet { color: #a0aec0; }

            padding: 0 30px 30px 30px;
            width: 100%;
            margin: 0 auto;
        }

        .ledger-card {
            background: #060d1f;
            border: 1px solid #142347;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #142347;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .ledger-header h4 {
            color: #c5a059;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ledger-table-wrapper {
            max-height: 180px;
            overflow-y: auto;
        }

        .ledger-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }
