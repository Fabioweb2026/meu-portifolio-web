<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - AAA+ UI</title>
    <style>
        /* =====================================================
           2. AAA+ CASINO UI STYLE (CSS - PREMIUM DESIGN)
           ===================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1f, #0b0b10);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #111;
            border-bottom: 2px solid gold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
            border-radius: 4px;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: gold;
            letter-spacing: 1px;
        }

        .balance {
            font-size: 18px;
            color: #4ade80;
            font-weight: 600;
            background: rgba(74, 222, 128, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            padding: 20px;
        }

        .slot-machine {
            display: flex;
            gap: 20px;
            background: #111;
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid #222;
            box-shadow: 0 0 50px rgba(255,215,0,0.15);
            margin-bottom: 40px;
        }

        .reel {
            width: 120px;
            height: 120px;
            font-size: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #17171c;
            border-radius: 10px;
            border: 1px solid #333;
            transition: all 0.1s ease;
            user-select: none;
        }

        /* Animação ultra fluida de rotação */
        .reel.spinning {
            animation: blurGlow 0.1s infinite alternate;
        }

        @keyframes blurGlow {
            from { text-shadow: 0 0 10px gold; transform: translateY(-3px); filter: blur(1px); }
            to { text-shadow: 0 0 25px gold; transform: translateY(3px); filter: blur(2px); }
        }

        .spin-btn {
            padding: 18px 60px;
            font-size: 20px;
            background: linear-gradient(185deg, #ffe066, #f5b000);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 6px 20px rgba(245, 176, 0, 0.4);
            transition: all 0.2s ease;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 176, 0, 0.6);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .spin-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="casino-container">
        <header className="topbar" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #111; border-bottom: 2px solid gold; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
            <div class="brand-container">
                <img 
                    src="mediterranea.png.png" 
                    alt="Mediterranea Logo" 
                    class="brand-logo"
                    id="logo-img"
                />
                <div class="brand">Mediterranea Casino</div>
            </div>
            <div class="balance" id="balance-display">Balanço: €1000</div>
        </header>

        <main class="game-area">
            <div class="slot-machine">
                <div class="reel" id="reel-0">❔</div>
                <div class="reel" id="reel-1">❔</div>
                <div class="reel" id="reel-2">❔</div>
            </div>

            <button class="spin-btn" id="spin-button">JOGAR</button>
        </main>
    </div>

    <!-- Lógica Vanilla estável e imune a erros de CDNs externos -->
    <script>
        // Configuração do Estado Inicial
        let balance = 1000;
        let isSpinning = false;
        const symbols = ["🍒", "💎", "🔔", "7️⃣", "⭐", "🍀"];

        // Seleção de Elementos do DOM
        const reelElements = [
            document.getElementById('reel-0'),
            document.getElementById('reel-1'),
            document.getElementById('reel-2')
        ];
        const balanceDisplay = document.getElementById('balance-display');
        const spinButton = document.getElementById('spin-button');
        const logoImg = document.getElementById('logo-img');

        // Ocultar tag de imagem quebrada caso não exista no diretório do Github
        logoImg.onerror = function() {
            logoImg.style.display = 'none';
        };

        // Função de Giro do Cassino
        function spin() {
            if (isSpinning) return;

            isSpinning = true;
            spinButton.disabled = true;
            spinButton.innerText = "RODANDO...";

            // Adiciona a classe de animação visual CSS
            reelElements.forEach(reel => reel.classList.add('spinning'));

            // Loop de Embaralhamento rápido
            const intervalId = setInterval(() => {
                reelElements.forEach(reel => {
                    reel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                });
            }, 100);

            // Resposta final simulada do Servidor após 2 segundos
            setTimeout(() => {
                clearInterval(intervalId);

                // Geração estrita do resultado final
                const finalResult = [
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)]
                ];

                // Renderiza o resultado final fixo e remove animação
                finalResult.forEach((symbol, index) => {
                    reelElements[index].innerText = symbol;
                    reelElements[index].classList.remove('spinning');
                });

                // Validação de Ganho (Todos os três rolos iguais)
                const isWin = finalResult[0] === finalResult[1] && finalResult[1] === finalResult[2];

                if (isWin) {
                    balance += 200;
                } else {
                    balance -= 50;
                }

                // Atualiza a UI
                balanceDisplay.innerText = `Balanço: €${balance}`;
                isSpinning = false;
                spinButton.disabled = false;
                spinButton.innerText = "JOGAR";

            }, 2000);
        }

        // Listener do Botão
        spinButton.addEventListener('click', spin);
    </script>
</body>
</html>
