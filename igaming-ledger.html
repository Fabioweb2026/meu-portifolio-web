<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - AAA+ UI & Compliance Ledger</title>
    <style>
        /* =====================================================
           DESIGN CORPORATIVO PREMIUM - CASINO UI
           ===================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top, #16161a, #08080c);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0f0f12;
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            height: 45px;
            width: auto;
            object-fit: contain;
            border-radius: 4px;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .session-timer {
            font-size: 14px;
            color: #a0aec0;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance {
            font-size: 18px;
            color: #4ade80;
            font-weight: 600;
            background: rgba(74, 222, 128, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.1);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            padding: 40px 30px;
            flex: 1;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* PAINEL DE CONTROLE DE COMPLIANCE */
        .compliance-panel {
            background: #111115;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .compliance-panel h3 {
            color: #d4af37;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            color: #a0aec0;
            text-transform: uppercase;
        }

        .control-group select, .control-group input {
            background: #17171c;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .mga-badge {
            margin-top: auto;
            font-size: 11px;
            color: #718096;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 15px;
            line-height: 1.4;
        }

        /* ÁREA PRINCIPAL DO JOGO */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f13;
            border-radius: 16px;
            border: 1px solid #222;
            padding: 40px;
        }

        .slot-machine {
            display: flex;
            gap: 20px;
            background: #09090b;
            padding: 30px 40px;
            border-radius: 24px;
            border: 2px solid #1a1a22;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.1);
            margin-bottom: 40px;
        }

        .reel {
            width: 140px;
            height: 140px;
            font-size: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #131317, #1c1c24);
            border-radius: 16px;
            border: 1px solid #2d2d37;
            transition: all 0.1s ease;
            user-select: none;
        }

        .reel.spinning {
            animation: blurGlow 0.1s infinite alternate;
        }

        @keyframes blurGlow {
            from { text-shadow: 0 0 10px #d4af37; transform: translateY(-4px); filter: blur(1px); }
            to { text-shadow: 0 0 30px #d4af37; transform: translateY(4px); filter: blur(2px); }
        }

        .spin-btn {
            padding: 20px 80px;
            font-size: 22px;
            background: linear-gradient(185deg, #fff3a8, #d4af37);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.5);
        }

        .spin-btn:disabled {
            background: #2d2d35;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* SEÇÃO DA TRILHA DE AUDITORIA (LEDGER) */
        .ledger-section {
            padding: 0 30px 40px 30px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        .ledger-card {
            background: #111115;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
        }

        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .ledger-header h4 {
            color: #d4af37;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ledger-table-wrapper {
            max-height: 200px;
            overflow-y: auto;
        }

        .ledger-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        .ledger-table th {
            color: #718096;
            padding: 10px;
            border-bottom: 1px solid #1a1a22;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }

        .ledger-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #1a1a22;
            font-family: 'Courier New', Courier, monospace;
        }

        .status-win { color: #4ade80; font-weight: bold; }
        .status-loss { color: #f87171; }
        .hash-text { color: #63b3ed; font-size: 11px; }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR REGULAMENTADA -->
    <header class="topbar">
        <div class="brand-container">
            <img src="mediterranea.png.png" alt="Logo" class="brand-logo" id="logo-img" />
            <div class="brand">Mediterranea</div>
        </div>
        <div class="stats-container">
            <div class="session-timer" id="session-clock">Sessão: 00:00</div>
            <div class="balance" id="balance-display">Balanço: €1.000,00</div>
        </div>
    </header>

    <div class="main-layout">
        <!-- PAINEL LATERAL DE COMPLIANCE / CONFIGURAÇÃO -->
        <aside class="compliance-panel">
            <h3>Jogo Responsável</h3>
            
            <div class="control-group">
                <label>Aposta por Jogada</label>
                <select id="bet-size">
                    <option value="10">€10,00</option>
                    <option value="25">€25,00</option>
                    <option value="50" selected>€50,00</option>
                    <option value="100">€100,00</option>
                </select>
            </div>

            <div class="control-group">
                <label>Limite de Perda da Sessão</label>
                <input type="text" value="€500,00" disabled style="color: #718096;" />
            </div>

            <div class="mga-badge">
                Licença MGA/B2C/2026<br>
                Operação Segura Submetida a Auditoria Criptográfica Contínua.
            </div>
        </aside>

        <!-- ÁREA CENTRAL DO MÓDULO CASINO -->
        <main class="game-area">
            <div class="slot-machine">
                <div class="reel" id="reel-0">🎰</div>
                <div class="reel" id="reel-1">🎰</div>
                <div class="reel" id="reel-2">🎰</div>
            </div>

            <button class="spin-btn" id="spin-button">Rodar</button>
        </main>
    </div>

    <!-- SISTEMA DE TRILHA DE AUDITORIA (LEDGER LOGS) -->
    <section class="ledger-section">
        <div class="ledger-card">
            <div class="ledger-header">
                <h4>Trilha de Auditoria em Tempo Real (RNG Ledger Logs)</h4>
