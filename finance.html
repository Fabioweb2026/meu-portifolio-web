<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker | Fábio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .finance-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .balance-box { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .balance-box h2 { margin: 0; font-size: 1rem; color: #666; }
        .total-amount { font-size: 2.5rem; margin: 10px 0; color: #2c3e50; }
        .negativo { color: #e74c3c; }
        .positivo { color: #2ecc71; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        label { display: block; text-align: left; font-weight: bold; color: #444; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; color: white; }
        .btn-add { background: #2ecc71; }
        .btn-sub { background: #e74c3c; }
        .btn:hover { opacity: 0.8; }
        
        .back-link { display: block; margin-top: 20px; text-decoration: none; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="finance-card">
    <h1>💰 Finance Tracker</h1>
    
    <div class="balance-box">
        <h2>Total Balance</h2>
        <div id="totalDisplay" class="total-amount">$ 0.00</div>
    </div>

    <label>Income (Entrada)</label>
    <input type="number" id="income" placeholder="Ex: 1000">

    <label>Expenses (Saída)</label>
    <input type="number" id="expenses" placeholder="Ex: 500">

    <div class="btn-group">
        <button class="btn btn-add" onclick="calcular('soma')">Somar (+)</button>
        <button class="btn btn-sub" onclick="calcular('sub')">Subtrair (-)</button>
    </div>

    <a href="index.html" class="back-link">← Back to Portfolio</a>
</div>

<script>
    function calcular(operacao) {
        const inc = parseFloat(document.getElementById('income').value) || 0;
        const exp = parseFloat(document.getElementById('expenses').value) || 0;
        const display = document.getElementById('totalDisplay');
        
        let resultado = 0;
        
        if (operacao === 'soma') {
            resultado = inc + exp;
        } else {
            resultado = inc - exp;
        }

        // Formatação profissional
        display.innerText = "$ " + resultado.toFixed(2);
        
        // Mudar cor se for negativo
        if (resultado < 0) {
            display.className = "total-amount negativo";
        } else {
            display.className = "total-amount positivo";
        }
    }
</script>

</body>
</html>
